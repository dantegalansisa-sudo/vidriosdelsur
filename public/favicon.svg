<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#0F172A"/>

  <!-- Window frame (aluminum) -->
  <rect x="10" y="10" width="44" height="44" rx="4" stroke="#94A3B8" stroke-width="3" fill="none"/>

  <!-- Cross bars (aluminum frame) -->
  <line x1="32" y1="10" x2="32" y2="54" stroke="#94A3B8" stroke-width="2.5"/>
  <line x1="10" y1="32" x2="54" y2="32" stroke="#94A3B8" stroke-width="2.5"/>

  <!-- Glass panes with crystal blue gradient -->
  <defs>
    <linearGradient id="glass1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="glass2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
  </defs>

  <!-- Top-left pane -->
  <rect x="11.5" y="11.5" width="19.25" height="19.25" rx="2" fill="url(#glass1)"/>
  <!-- Top-right pane -->
  <rect x="33.25" y="11.5" width="19.25" height="19.25" rx="2" fill="url(#glass2)"/>
  <!-- Bottom-left pane -->
  <rect x="11.5" y="33.25" width="19.25" height="19.25" rx="2" fill="url(#glass2)"/>
  <!-- Bottom-right pane -->
  <rect x="33.25" y="33.25" width="19.25" height="19.25" rx="2" fill="url(#glass1)"/>

  <!-- Glass reflection lines -->
  <line x1="16" y1="14" x2="14" y2="22" stroke="white" stroke-width="1" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="38" y1="14" x2="36" y2="22" stroke="white" stroke-width="1" stroke-opacity="0.25" stroke-linecap="round"/>
  <line x1="16" y1="36" x2="14" y2="44" stroke="white" stroke-width="1" stroke-opacity="0.25" stroke-linecap="round"/>
  <line x1="38" y1="36" x2="36" y2="44" stroke="white" stroke-width="1" stroke-opacity="0.35" stroke-linecap="round"/>

  <!-- Warm accent bar at bottom -->
  <rect x="22" y="56" width="20" height="3" rx="1.5" fill="url(#warm)"/>
</svg>
